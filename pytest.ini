[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
addopts = 
    -ra 
    --strict-markers
    --cov=model_track 
    --cov-report=term-missing 
    --cov-report=xml
    --cov-fail-under=90

# Definindo markers para separar os testes se necessário no futuro
markers =
    unit: Testes unitários rápidos
    statistical: Testes de propriedade com Hypothesis
    integration: Testes de fluxo completo
    benchmark: Testes de performance
